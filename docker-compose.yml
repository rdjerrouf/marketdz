# ============================================================================
# MarketDZ – Production-like Docker Compose
# ============================================================================
# Expects Supabase running locally via `supabase start`.
# Usage:
#   cp .env.example .env.docker   (fill in real keys)
#   docker compose --env-file .env.docker up --build -d
# ============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "com.marketdz.service=app"
      - "com.marketdz.env=docker-local"

# No external network needed — the app reaches Supabase on the host via host.docker.internal